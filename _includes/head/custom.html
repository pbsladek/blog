<script>
  (function () {
    try {
      var theme = window.localStorage.getItem("pbsladek.blog.theme");
      document.documentElement.setAttribute("data-theme", theme === "light" ? "light" : "dark");
    } catch (error) {
      document.documentElement.setAttribute("data-theme", "dark");
    }
  }());
</script>
