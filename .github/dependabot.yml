version: 2

multi-ecosystem-groups:
  weekly-dependencies:
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Los_Angeles

updates:
  - package-ecosystem: bundler
    directory: /
    patterns:
      - "*"
    multi-ecosystem-group: weekly-dependencies
    open-pull-requests-limit: 1

  - package-ecosystem: github-actions
    directory: /
    patterns:
      - "*"
    multi-ecosystem-group: weekly-dependencies
    open-pull-requests-limit: 1

  - package-ecosystem: docker
    directory: /
    patterns:
      - "*"
    multi-ecosystem-group: weekly-dependencies
    open-pull-requests-limit: 1
